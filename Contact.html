<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif; 
}


:root {
    --primary-bg: #00041A;
    
    --text-color: #FFFFFF;
    --accent-pink: #FF4500; 
    
    --accent-cyan: #FFFF00; 
    
    --btn-gradient: linear-gradient(80deg, var(--accent-pink), var(--accent-cyan));
    --input-bg: #1a1a2e; 
    
    --border-color: #3a3f47; 
}

body {
    background-color: var(--primary-bg);
    color: var(--text-color);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}


header {
    width: 100%;
    padding: 20px 10%; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: var(--primary-bg);
    position: relative;
    z-index: 100;
}


.navbar ul {
    list-style: none;
    display: flex;
}

.navbar ul li {
    margin: 0 15px;
}

.navbar ul li a {
    text-decoration: none;
    color: var(--text-color);
    font-size: 18px;
    transition: 0.3s;
}

.navbar ul li a:hover,
.navbar ul li a.active {
    color: var(--accent-pink);
}

.btn {
    display: inline-block;
    padding: 10px 25px;
    background: var(--btn-gradient);
    text-decoration: none;
    color: var(--text-color);
    border-radius: 8px;
    font-weight: 500;
    font-size: 16px;
    transition: 0.3s;
    border: none;
}

.btn:hover {
    opacity: 0.9;
    transform: translateY(-2px);
}


.contact-container {
    flex-grow: 1; 
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 40px;
    
    padding: 50px 10%;
    
    align-items: center;
    
    max-width: 1200px;
        
    margin: 40px auto; 
    background-color: var(--primary-bg); 
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.3); 
}



.contact-info {
    padding: 20px;
}

.contact-info h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--accent-cyan);
}

.contact-info p {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 30px;
    color: #ccc;
}

.contact-details {
    list-style: none;
    font-size: 1.05rem;
    line-height: 2;
}

.contact-details li strong {
    color: var(--accent-pink);
    margin-right: 10px;
}

.contact-details a {
    color: var(--accent-cyan);
    text-decoration: none;
    transition: color 0.3s ease;
}

.contact-details a:hover {
    color: var(--accent-pink);
    text-decoration: underline;
}


.contact-form-wrapper {
    grid-column: 1 / -1;
    
    padding: 30px;
    background-color: var(--input-bg); 
    
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
}

.contact-form {
    display: flex;
    flex-direction: column;
}

.contact-form label {
    font-size: 1rem;
    margin-bottom: 8px;
    color: var(--text-color);
    font-weight: 500;
}

.contact-form input,
.contact-form textarea {
    padding: 12px 15px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
    border-radius: 5px;
    background-color: var(--primary-bg); 
    
    color: var(--text-color);
    font-size: 1rem;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.contact-form input:focus,
.contact-form textarea:focus {
    border-color: var(--accent-cyan);
    outline: none;
    box-shadow: 0 0 0 3px rgba(3, 217, 249, 0.3); 
    
}

.contact-form textarea {
    resize: vertical;
    
    min-height: 120px;
}

.contact-form button[type="submit"] {
    width: fit-content; 
    
    align-self: center; 
    
    padding: 15px 40px;
    font-size: 1.1rem;
    cursor: pointer;
    background: var(--btn-gradient); 
    
    color: var(--text-color);
    border: none;
    border-radius: 8px;
    font-weight: 600;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.contact-form button[type="submit"]:hover {
    transform: translateY(-3px);
    opacity: 0.9;
}


 @media (max-width: 992px) {
    .contact-container {
        grid-template-columns: 1fr;
    
        padding: 40px 5%; 
        
        gap: 30px;
    }


    .contact-form-wrapper {
        grid-column: auto;
        
    }


@media (max-width: 768px) {
    header {
        flex-direction: column;
        padding: 20px 5%;
    }
    .navbar ul {
        margin-top: 20px;
        flex-wrap: wrap;
        
        justify-content: center;
    }
    .navbar ul li {
        margin: 5px 10px;
    }
    .btn { 
        margin-top: 15px;  
        
    }
    .contact-info h1 {
        font-size: 2rem;
    }
    .contact-info p, .contact-details li {
        font-size: 1rem;
    }
    .contact-form button[type="submit"] {
        padding: 12px 30px;
        font-size: 1rem;
    }</style>
